<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag cực kỳ quan trọng: viewport-fit=cover để lấy được safe-area từ điện thoại -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DocHub - Galaxy V4</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#0B0D17', 800: '#15192B', 700: '#1E2440' },
                        neon: { blue: '#00F0FF', purple: '#B026FF', pink: '#FF007F' }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Version 11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* ==========================================
           1. CẤU HÌNH FIREBASE CỦA BRO
           ========================================== */
        const firebaseConfig = {
            apiKey: "AIzaSyCLqRN936fxkbdu78248mdXWT7uSzhxYPQ",
            authDomain: "quanlydulieuapp.firebaseapp.com",
            projectId: "quanlydulieuapp",
            storageBucket: "quanlydulieuapp.firebasestorage.app",
            messagingSenderId: "907400767703",
            appId: "1:907400767703:web:bd4590862b274e2ee82892",
            measurementId: "G-L8YRSMQT5L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentUser = null;
        let documents = [];
        let currentFilter = 'all'; // all, drive, notion, other
        let currentFolderFilter = null; // null = xem tất cả thư mục
        let unsubscribeSnapshot = null;
        let editingDocId = null; // Lưu ID tài liệu đang được sửa

        /* ==========================================
           2. UI ELEMENTS
           ========================================== */
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginBtn = document.getElementById('loginBtn');
        const userAvatar = document.getElementById('userAvatar');
        
        const docListEl = document.getElementById('docList');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const currentFolderDisplay = document.getElementById('currentFolderDisplay');
        
        // Form & Modal
        const modalTitle = document.getElementById('modalTitle');
        const addModal = document.getElementById('addModal');
        const addBtn = document.getElementById('addBtn');
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        const addDocForm = document.getElementById('addDocForm');
        
        const docTitleInput = document.getElementById('docTitle');
        const docUrlInput = document.getElementById('docUrl');
        const docSourceInput = document.getElementById('docSource');
        const docTagsInput = document.getElementById('docTags');
        const docFolderInput = document.getElementById('docFolder');
        
        const toastContainer = document.getElementById('toastContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');

        const homeBtn = document.getElementById('homeBtn');
        const folderViewBtn = document.getElementById('folderViewBtn');

        /* ==========================================
           3. HÀM TIỆN ÍCH (TOAST & FORMAT)
           ========================================== */
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-neon-blue' : (type === 'error' ? 'bg-neon-pink' : 'bg-space-700 border border-space-600 text-white');
            const textColor = type === 'success' || type === 'error' ? 'text-space-900' : 'text-white';
            toast.className = `fixed top-16 left-1/2 transform -translate-x-1/2 ${bgColor} ${textColor} px-5 py-2.5 rounded-full shadow-[0_0_20px_rgba(0,0,0,0.5)] z-[100] text-sm font-bold opacity-0 transition-opacity duration-300 pointer-events-none`;
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function formatUrl(url) {
            if (!url) return '#';
            if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
            return url;
        }

        /* ==========================================
           4. XÁC THỰC NGƯỜI DÙNG (LOGIN REDIRECT)
           ========================================== */
        
        // 1. Kiểm tra kết quả trả về nếu vừa đăng nhập bằng popup/redirect xong
        getRedirectResult(auth).then((result) => {
            if (result) { /* Thành công, state listener sẽ lo liệu UI */ }
        }).catch((error) => {
            console.error("Lỗi xác thực:", error);
            showToast("Lỗi đăng nhập Google", "error");
            loginBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Đăng nhập bằng Google';
            lucide.createIcons();
        });

        // 2. Nút Bấm Đăng Nhập
        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-space-900"></div>';
                await signInWithRedirect(auth, provider);
            } catch (error) {
                showToast("Đăng nhập thất bại!", "error");
                loginBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Đăng nhập bằng Google';
                lucide.createIcons();
            }
        });

        // 3. Đăng xuất
        userAvatar.addEventListener('click', async () => {
            if(confirm("Đăng xuất khỏi trạm vũ trụ?")) {
                await signOut(auth);
            }
        });

        // 4. Lắng nghe trạng thái
        onAuthStateChanged(auth, (user) => {
            // Nếu có user VÀ KHÔNG PHẢI khách vô danh (bắt buộc dùng Google)
            if (user && !user.isAnonymous) {
                currentUser = user;
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden'); mainApp.classList.add('flex');
                
                if(user.photoURL) { userAvatar.innerHTML = `<img src="${user.photoURL}" class="w-full h-full rounded-full object-cover">`; } 
                else { userAvatar.innerHTML = `<i data-lucide="user" class="w-5 h-5 text-neon-purple"></i>`; }
                
                lucide.createIcons();
                fetchDocuments();
                checkUrlForBookmarklet(); // Kiểm tra xem có đang mở từ Extension/Bookmarklet không
            } else if (user && user.isAnonymous) {
                 // Nếu lỡ vô danh, sign out để bắt đăng nhập Google
                 signOut(auth);
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden'); loginScreen.classList.add('flex');
                mainApp.classList.add('hidden'); mainApp.classList.remove('flex');
                if(unsubscribeSnapshot) unsubscribeSnapshot();
                loginBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Đăng nhập bằng Google';
                lucide.createIcons();
            }
        });

        /* ==========================================
           5. KIỂM TRA BẮN LINK TỪ BÊN NGOÀI (BOOKMARKLET)
           ========================================== */
        function checkUrlForBookmarklet() {
            const urlParams = new URLSearchParams(window.location.search);
            const passedUrl = urlParams.get('url');
            const passedTitle = urlParams.get('title');

            if (passedUrl) {
                // Tự động mở Modal Thêm mới và điền thông tin
                openModal(passedUrl, passedTitle);
                // Xóa tham số trên thanh địa chỉ để F5 không bị mở lại
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        /* ==========================================
           6. LOGIC DỮ LIỆU (CRUD FIREBASE)
           ========================================== */
        function fetchDocuments() {
            if (!currentUser) return;
            loadingIndicator.classList.remove('hidden');

            const docsRef = collection(db, 'artifacts', 'dochub-galaxy-v4', 'users', currentUser.uid, 'documents');
            
            unsubscribeSnapshot = onSnapshot(docsRef, (snapshot) => {
                documents = [];
                snapshot.forEach((doc) => { documents.push({ id: doc.id, ...doc.data() }); });
                
                // Sắp xếp: Ưu tiên mục GHIM lên đầu, sau đó sắp xếp theo Thời gian MỚI NHẤT
                documents.sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });

                loadingIndicator.classList.add('hidden');
                renderCurrentView();
            }, (error) => {
                loadingIndicator.classList.add('hidden');
                showToast("Lỗi tải dữ liệu!", "error");
            });
        }

        // THÊM HOẶC CẬP NHẬT TÀI LIỆU
        addDocForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const title = docTitleInput.value.trim();
            const urlRaw = docUrlInput.value.trim();
            const source = docSourceInput.value;
            // Mặc định ném vào Inbox nếu để trống
            const folder = docFolderInput.value.trim() || 'Inbox'; 
            const tagsInput = docTagsInput.value;
            
            if (!title) return;

            const url = formatUrl(urlRaw);
            const tags = tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag !== "");

            const submitBtn = document.getElementById('submitDocBtn');
            submitBtn.disabled = true; submitBtn.innerHTML = 'Đang lưu...';

            try {
                const docsRef = collection(db, 'artifacts', 'dochub-galaxy-v4', 'users', currentUser.uid, 'documents');
                if (editingDocId) {
                    // Update Mode
                    const docToUpdate = doc(db, 'artifacts', 'dochub-galaxy-v4', 'users', currentUser.uid, 'documents', editingDocId);
                    await updateDoc(docToUpdate, { title, url, source, folder, tags });
                    showToast("Đã cập nhật!");
                } else {
                    // Add New Mode
                    await addDoc(docsRef, { title, url, source, folder, tags, isPinned: false, createdAt: serverTimestamp() });
                    showToast("Bắn link thành công!");
                }
                closeModal();
            } catch (error) { 
                console.error(error);
                showToast("Lỗi lưu!", "error"); 
            } finally { 
                submitBtn.disabled = false; 
                submitBtn.innerHTML = editingDocId ? 'Cập nhật' : 'Lưu tài liệu'; 
            }
        });

        // XÓA
        window.deleteDocument = async (docId, event) => {
            if(event) { event.preventDefault(); event.stopPropagation(); }
            if (!currentUser || !confirm("Xóa tài liệu này?")) return;
            try {
                const docRef = doc(db, 'artifacts', 'dochub-galaxy-v4', 'users', currentUser.uid, 'documents', docId);
                await deleteDoc(docRef);
                showToast("Đã xóa!");
            } catch (error) { showToast("Lỗi xóa!", "error"); }
        };

        // GHIM LÊN ĐẦU
        window.togglePin = async (docId, currentPinState, event) => {
            if(event) { event.preventDefault(); event.stopPropagation(); }
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', 'dochub-galaxy-v4', 'users', currentUser.uid, 'documents', docId);
                await updateDoc(docRef, { isPinned: !currentPinState });
                showToast(currentPinState ? "Đã bỏ ghim" : "Đã ghim lên đầu", "success");
            } catch (error) { showToast("Lỗi ghim!", "error"); }
        };

        // GỌI FORM SỬA THÔNG TIN
        window.openEditModalFromList = (docId, event) => {
            if(event) { event.preventDefault(); event.stopPropagation(); }
            const docToEdit = documents.find(d => d.id === docId);
            if(!docToEdit) return;

            editingDocId = docId;
            modalTitle.innerHTML = `<i data-lucide="edit-3" class="text-neon-blue w-5 h-5"></i> Sửa thông tin`;
            document.getElementById('submitDocBtn').innerHTML = 'Cập nhật';
            
            docTitleInput.value = docToEdit.title || '';
            docUrlInput.value = docToEdit.url || '';
            docSourceInput.value = docToEdit.source || 'other';
            docFolderInput.value = docToEdit.folder || 'Inbox';
            docTagsInput.value = docToEdit.tags ? docToEdit.tags.join(', ') : '';

            lucide.createIcons();
            addModal.classList.remove('hidden'); addModal.classList.add('flex');
        };

        /* ==========================================
           7. RENDER UI VÀ BỘ LỌC
           ========================================== */
           
        // Lọc nội dung dựa trên: Thư mục đang chọn, Tab Đang chọn, và Thanh Search
        function renderCurrentView() {
            // Thanh tiêu đề thư mục
            if (currentFolderFilter) {
                currentFolderDisplay.innerHTML = `
                    <div class="flex items-center gap-2 mb-4 px-1">
                        <button onclick="clearFolderFilter()" class="text-gray-400 hover:text-white p-1 rounded-full bg-space-800"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <h2 class="text-neon-blue font-bold text-sm uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="folder-open" class="w-4 h-4"></i> ${currentFolderFilter}
                        </h2>
                    </div>
                `;
            } else { currentFolderDisplay.innerHTML = ''; }

            const searchTerm = searchInput.value.toLowerCase();
            
            const filteredData = documents.filter(doc => {
                // Điều kiện 1: Nguồn (Tabs: Tất cả / Drive / Notion / Inbox)
                let matchSource = true;
                if (currentFilter === 'inbox') {
                    // Cố tình lọc riêng những thằng có Folder là Inbox khi bấm tab Inbox
                    matchSource = (doc.folder || 'Inbox').toLowerCase() === 'inbox';
                } else if (currentFilter !== 'all') {
                    matchSource = doc.source === currentFilter;
                }
                
                // Điều kiện 2: Thư mục (Nếu đang đứng trong 1 thư mục cụ thể)
                const matchFolder = !currentFolderFilter || doc.folder === currentFolderFilter;
                
                // Điều kiện 3: Search text
                const titleMatch = doc.title ? doc.title.toLowerCase().includes(searchTerm) : false;
                const tagMatch = doc.tags ? doc.tags.some(tag => tag.toLowerCase().includes(searchTerm)) : false;
                const matchSearch = searchTerm === '' || titleMatch || tagMatch;

                return matchSource && matchFolder && matchSearch;
            });

            renderDocs(filteredData);
        }

        function renderDocs(data) {
            if (data.length === 0) {
                docListEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center opacity-60">
                        <i data-lucide="telescope" class="w-12 h-12 text-neon-blue mb-4"></i>
                        <p class="text-gray-400 text-sm">Chưa có tín hiệu nào ở đây.</p>
                    </div>
                `;
            } else {
                docListEl.innerHTML = data.map(createDocCard).join('');
            }
            lucide.createIcons();
        }

        // Tạo thẻ giao diện cho từng tài liệu
        function createDocCard(doc) {
            let iconName = 'link-2'; let glowColor = 'shadow-[0_0_10px_rgba(255,255,255,0.1)]'; let iconColor = 'text-gray-300';
            if (doc.source === 'drive') { iconName = 'hard-drive'; glowColor = 'shadow-[0_0_15px_rgba(0,240,255,0.3)]'; iconColor = 'text-neon-blue'; } 
            else if (doc.source === 'notion') { iconName = 'box'; glowColor = 'shadow-[0_0_15px_rgba(255,255,255,0.3)]'; iconColor = 'text-white'; } 

            const tagsHtml = doc.tags && doc.tags.length > 0 ? doc.tags.map(tag => `<span class="inline-block bg-space-800 text-gray-400 border border-space-700 text-[10px] px-2 py-0.5 rounded-md uppercase tracking-wider">#${tag}</span>`).join('') : '';
            const safeUrl = doc.url ? formatUrl(doc.url) : '#';
            const folderName = doc.folder || 'Inbox';
            const isInbox = folderName.toLowerCase() === 'inbox';
            const folderColor = isInbox ? 'text-neon-pink' : 'text-neon-blue/80';

            return `
                <div class="glass-card p-3.5 rounded-2xl flex gap-3 items-center relative group mb-3 transition-all ${doc.isPinned ? 'border-neon-pink/30 bg-neon-pink/5' : 'hover:border-neon-blue/30'}">
                    <!-- Icon -->
                    <div class="bg-space-800 p-2.5 rounded-xl flex-shrink-0 border border-space-700 ${glowColor}">
                        <i data-lucide="${iconName}" class="w-5 h-5 ${iconColor}"></i>
                    </div>
                    
                    <!-- Text Content (Link bấm được) -->
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 min-w-0 block">
                        <div class="flex items-center gap-1.5">
                            ${doc.isPinned ? '<i data-lucide="pin" class="w-3 h-3 text-neon-pink fill-neon-pink flex-shrink-0"></i>' : ''}
                            <h3 class="font-semibold text-white text-sm truncate hover:text-neon-blue transition-colors leading-tight">${doc.title}</h3>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-1 flex items-center gap-1.5">
                            <span class="${folderColor} font-medium flex items-center gap-1"><i data-lucide="folder" class="w-3 h-3"></i>${folderName}</span>
                            <span class="text-gray-600">•</span>
                            <span class="capitalize">${doc.source}</span>
                        </p>
                        ${tagsHtml ? `<div class="flex gap-1 mt-2 overflow-x-hidden flex-wrap">${tagsHtml}</div>` : ''}
                    </a>
                    
                    <!-- Các nút Dọc -->
                    <div class="flex flex-col gap-2 flex-shrink-0">
                        <button onclick="togglePin('${doc.id}', ${doc.isPinned}, event)" class="p-1.5 rounded-full ${doc.isPinned ? 'text-neon-pink bg-neon-pink/10' : 'text-gray-500 hover:text-white'} transition-colors">
                            <i data-lucide="${doc.isPinned ? 'pin-off' : 'pin'}" class="w-4 h-4 pointer-events-none"></i>
                        </button>
                        <div class="flex gap-1">
                            <button onclick="openEditModalFromList('${doc.id}', event)" class="p-1.5 text-gray-500 hover:text-neon-blue transition-colors">
                                <i data-lucide="edit-3" class="w-4 h-4 pointer-events-none"></i>
                            </button>
                            <button onclick="deleteDocument('${doc.id}', event)" class="p-1.5 text-gray-500 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Chế độ View thư mục dạng Grid
        function renderFolderView() {
            currentFolderFilter = null; currentFolderDisplay.innerHTML = '';
            
            const folders = [...new Set(documents.map(d => d.folder || 'Inbox'))];
            if (folders.length === 0) { renderDocs([]); return; }

            const folderCounts = {};
            documents.forEach(d => { const f = d.folder || 'Inbox'; folderCounts[f] = (folderCounts[f] || 0) + 1; });

            docListEl.innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    ${folders.map(folder => {
                        const isInbox = folder.toLowerCase() === 'inbox';
                        const iconColor = isInbox ? 'text-neon-pink fill-neon-pink/20' : 'text-neon-blue fill-neon-blue/20';
                        const borderColor = isInbox ? 'border-neon-pink/30' : 'border-space-700';
                        return `
                        <div onclick="filterByFolder('${folder}')" class="glass-card p-4 rounded-2xl ${borderColor} flex flex-col items-center justify-center cursor-pointer hover:border-white/50 transition-all">
                            <i data-lucide="${isInbox ? 'inbox' : 'folder'}" class="w-8 h-8 ${iconColor} mb-2"></i>
                            <h3 class="font-bold text-white text-xs text-center truncate w-full">${folder}</h3>
                            <p class="text-[10px] text-gray-400 mt-0.5">${folderCounts[folder]} mục</p>
                        </div>
                    `}).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        window.filterByFolder = (folder) => { currentFolderFilter = folder; renderCurrentView(); searchInput.value = ''; };
        window.clearFolderFilter = () => { currentFolderFilter = null; renderCurrentView(); };

        /* ==========================================
           8. SỰ KIỆN TƯƠNG TÁC (TABS & MODAL & SEARCH)
           ========================================== */
        searchInput.addEventListener('input', () => {
            // Nếu đang đứng ở lưới thư mục mà gõ search thì tự động quay về list view
            if (!currentFolderFilter && document.querySelector('.grid-cols-2')) { renderCurrentView(); } else { renderCurrentView(); }
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-neon-blue/20', 'text-neon-blue', 'border-neon-blue/50');
                    b.classList.add('bg-space-800', 'text-gray-400', 'border-space-700');
                });
                const clickedBtn = e.currentTarget;
                clickedBtn.classList.remove('bg-space-800', 'text-gray-400', 'border-space-700');
                clickedBtn.classList.add('bg-neon-blue/20', 'text-neon-blue', 'border-neon-blue/50');
                
                currentFilter = clickedBtn.getAttribute('data-source');
                renderCurrentView();
            });
        });

        // Mở Form Thêm Mới - Có chức năng Auto Fill nếu bắn link từ ngoài
        function openModal(prefillUrl = '', prefillTitle = '') { 
            editingDocId = null;
            modalTitle.innerHTML = `<i data-lucide="rocket" class="text-neon-pink w-5 h-5"></i> Bắn tín hiệu mới`;
            document.getElementById('submitDocBtn').innerHTML = 'Lưu tài liệu';
            addDocForm.reset();
            
            // Tự điền nếu bắn link qua Bookmarklet
            if(prefillUrl) docUrlInput.value = prefillUrl;
            if(prefillTitle) docTitleInput.value = prefillTitle;
            
            // Phân tích nguồn (AI nhẹ)
            if(prefillUrl.includes('drive.google.com') || prefillUrl.includes('docs.google.com')) docSourceInput.value = 'drive';
            else if(prefillUrl.includes('notion.so') || prefillUrl.includes('notion.site')) docSourceInput.value = 'notion';
            else docSourceInput.value = 'other';

            docFolderInput.value = 'Inbox'; // Default to Inbox chuẩn quy trình Zero Inbox
            
            lucide.createIcons();
            addModal.classList.remove('hidden'); addModal.classList.add('flex'); 
        }
        function closeModal() { addModal.classList.add('hidden'); addModal.classList.remove('flex'); }
        
        addBtn.addEventListener('click', () => openModal());
        cancelAddBtn.addEventListener('click', closeModal);

        // Nút Thanh Điều Hướng (Bottom Nav)
        homeBtn.addEventListener('click', () => {
            currentFolderFilter = null; searchInput.value = '';
            document.querySelector('.content-area').scrollTo({ top: 0, behavior: 'smooth' });
            renderCurrentView();
        });

        folderViewBtn.addEventListener('click', () => { 
            searchInput.value = ''; 
            renderFolderView(); 
        });

        initAuth();
        lucide.createIcons();
    </script>

    <style>
        /* CSS FIX LỖI SAFE AREA CHO MOBILE BROWSER (KHÔNG BỊ LẸM NÚT) */
        
        body { 
            background-color: #0B0D17; color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; /* Chống cuộn body, chỉ cuộn content */
            margin: 0; padding: 0;
            /* Đảm bảo toàn bộ chiều cao màn hình luôn nằm đúng trong thẻ body */
            height: 100vh;
            height: 100dvh;
        }

        .galaxy-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at 15% 50%, rgba(176, 38, 255, 0.08), transparent 25%), 
                        radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.08), transparent 25%); 
            z-index: 0; pointer-events: none; 
        }

        .glass-card { 
            background: rgba(21, 25, 43, 0.6); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .glass-header { 
            background: rgba(11, 13, 23, 0.85); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Container bọc toàn bộ App */
        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            height: 100%; /* Kế thừa chiều cao 100dvh của body */
            display: flex; flex-direction: column; 
            position: relative; z-index: 1; 
        }

        /* Khu vực danh sách cuộn được, chừa chỗ cứng cho Thanh Nav tránh lẹm */
        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            /* Cực kỳ quan trọng: Padding dưới + SafeArea bottom = Tránh lẹm nút */
            padding-bottom: calc(110px + env(safe-area-inset-bottom, 20px)); 
            scroll-behavior: smooth; 
        }
        
        .neon-input { 
            background: rgba(30, 36, 64, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; transition: all 0.3s ease; 
        }
        .neon-input:focus { outline: none; border-color: #00F0FF; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        
        /* Cố định Bottom Nav và tính toán khoảng cách mép dưới màn hình (Tai thỏ iPhone/Thanh vuốt) */
        .bottom-nav-safe {
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 12px));
        }
    </style>
</head>
<body>

<div class="galaxy-bg"></div>
<div id="toastContainer"></div>

<!-- MÀN HÌNH ĐĂNG NHẬP -->
<div id="loginScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-space-900 hidden">
    <div class="glass-card p-8 rounded-3xl flex flex-col items-center text-center max-w-sm w-11/12 border-neon-blue/30 shadow-[0_0_30px_rgba(0,240,255,0.15)]">
        <div class="w-24 h-24 rounded-full bg-space-800 border-2 border-neon-blue flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(0,240,255,0.4)]">
            <i data-lucide="rocket" class="w-12 h-12 text-neon-blue"></i>
        </div>
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-neon-blue to-neon-purple mb-2">DocHub</h1>
        <p class="text-gray-400 text-sm mb-8">Hệ điều hành dữ liệu cá nhân.</p>
        
        <button id="loginBtn" class="w-full py-3.5 bg-white text-gray-900 font-bold rounded-xl flex items-center justify-center gap-3 hover:bg-gray-100 transition shadow-lg active:scale-95">
            <i data-lucide="log-in" class="w-5 h-5"></i> Đăng nhập bằng Google
        </button>
        <p class="text-[10px] text-gray-500 mt-6">Dữ liệu mã hóa an toàn trên Firebase.</p>
    </div>
</div>

<!-- MÀN HÌNH APP CHÍNH -->
<div id="mainApp" class="app-container hidden">
    
    <!-- Header -->
    <div class="glass-header pt-8 pb-4 px-5 z-10 sticky top-0" style="padding-top: max(2rem, env(safe-area-inset-top));">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-neon-blue to-neon-purple">DocHub</h1>
                <p class="text-gray-400 text-[10px] uppercase tracking-widest mt-1">Trạm không gian cá nhân</p>
            </div>
            <div id="userAvatar" class="w-10 h-10 rounded-full border border-space-700 flex items-center justify-center bg-space-800 shadow-[0_0_10px_rgba(176,38,255,0.2)] cursor-pointer hover:border-neon-pink transition">
                <i data-lucide="user" class="w-5 h-5 text-neon-purple"></i>
            </div>
        </div>
        
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-3.5 text-gray-400 w-5 h-5"></i>
            <input type="text" id="searchInput" class="w-full neon-input rounded-2xl py-3 pl-12 pr-4 text-sm placeholder-gray-500" placeholder="Tìm tín hiệu, tag, thư mục...">
        </div>
    </div>

    <!-- Filters (Cuộn ngang) -->
    <div class="px-5 py-3 overflow-x-auto whitespace-nowrap flex gap-3 z-10 border-b border-space-800 shadow-sm flex-shrink-0">
        <button class="filter-btn active px-4 py-2 bg-neon-blue/20 text-neon-blue border border-neon-blue/50 rounded-full text-xs font-medium transition-all" data-source="all">Tất cả</button>
        <button class="filter-btn px-4 py-2 bg-space-800 text-gray-400 border border-space-700 rounded-full text-xs font-medium transition-all flex items-center gap-1" data-source="inbox"><i data-lucide="inbox" class="w-3 h-3"></i> Inbox</button>
        <button class="filter-btn px-4 py-2 bg-space-800 text-gray-400 border border-space-700 rounded-full text-xs font-medium transition-all" data-source="drive">Drive</button>
        <button class="filter-btn px-4 py-2 bg-space-800 text-gray-400 border border-space-700 rounded-full text-xs font-medium transition-all" data-source="notion">Notion</button>
    </div>

    <!-- Danh sách (Nơi cuộn dữ liệu) -->
    <div class="content-area px-5 py-4 w-full">
        <div id="currentFolderDisplay"></div>
        <div id="docList">
            <div id="loadingIndicator" class="flex justify-center items-center py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-neon-blue"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav (Đã sửa khoảng cách mép màn hình chống lẹm nút) -->
    <div class="absolute bottom-0 left-0 w-full glass-header px-8 pt-3 flex justify-between items-center z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] bottom-nav-safe">
        <div id="homeBtn" class="flex flex-col items-center text-neon-blue cursor-pointer transition transform active:scale-90 w-16">
            <i data-lucide="radar" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-medium">Radar</span>
        </div>
        
        <!-- Nút Plus đẩy cao hơn thanh Nav một chút -->
        <div class="relative -top-6 w-16 flex justify-center">
            <button id="addBtn" class="bg-gradient-to-r from-neon-blue to-neon-purple text-white p-4 rounded-full shadow-[0_0_20px_rgba(176,38,255,0.4)] hover:scale-105 active:scale-95 transition transform flex items-center justify-center border-2 border-space-900 absolute bottom-0">
                <i data-lucide="plus" class="w-7 h-7"></i>
            </button>
        </div>
        
        <div id="folderViewBtn" class="flex flex-col items-center text-gray-500 hover:text-white transition cursor-pointer transform active:scale-90 w-16">
            <i data-lucide="folder-kanban" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-medium">Thư mục</span>
        </div>
    </div>
</div>

<!-- Modal Thêm/Sửa Tài Liệu -->
<div id="addModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-5">
    <div class="glass-card w-full max-w-sm rounded-3xl p-6 border border-space-700 shadow-[0_0_30px_rgba(0,240,255,0.1)] transform transition-all">
        <h2 id="modalTitle" class="text-xl font-bold mb-5 text-white flex items-center gap-2">
            <i data-lucide="rocket" class="text-neon-pink w-5 h-5"></i> Bắn tín hiệu mới
        </h2>
        <form id="addDocForm" class="flex flex-col gap-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-1">Tên tài liệu <span class="text-neon-pink">*</span></label>
                <input type="text" id="docTitle" required class="w-full neon-input rounded-xl py-2.5 px-4 text-sm" placeholder="Vd: Bản vẽ kỹ thuật...">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-1">Đường dẫn (URL) <span class="text-neon-pink">*</span></label>
                <input type="url" id="docUrl" required class="w-full neon-input rounded-xl py-2.5 px-4 text-sm" placeholder="https://...">
            </div>
            <div class="flex gap-3">
                <div class="flex-[1.5]">
                    <label class="block text-xs text-gray-400 mb-1 ml-1">Thư mục (Zero Inbox)</label>
                    <input type="text" id="docFolder" class="w-full neon-input rounded-xl py-2.5 px-4 text-sm text-neon-pink font-medium" placeholder="Mặc định: Inbox" value="Inbox">
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-gray-400 mb-1 ml-1">Nguồn</label>
                    <select id="docSource" class="w-full neon-input rounded-xl py-2.5 px-2 text-sm appearance-none bg-space-800">
                        <option value="other">Khác</option>
                        <option value="drive">Drive</option>
                        <option value="notion">Notion</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-1">Tags (cách nhau dấu phẩy)</label>
                <input type="text" id="docTags" class="w-full neon-input rounded-xl py-2.5 px-4 text-sm" placeholder="Vd: q3, design, code">
            </div>
            
            <div class="flex gap-3 mt-4">
                <button type="button" id="cancelAddBtn" class="flex-1 py-3 rounded-xl bg-space-800 text-gray-300 font-medium text-sm hover:bg-space-700 transition active:scale-95">Hủy</button>
                <button type="submit" id="submitDocBtn" class="flex-[2] py-3 rounded-xl bg-neon-blue text-space-900 font-bold text-sm hover:shadow-[0_0_15px_rgba(0,240,255,0.4)] transition active:scale-95">Lưu tài liệu</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
